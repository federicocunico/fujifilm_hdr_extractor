name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build portable app
        run: uv run pyinstaller --noconfirm "Fuji HDR Extractor.spec"

      - name: Package zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "dev" }
          $archive = "Fuji-HDR-Extractor-$version-Windows-x64.zip"
          Compress-Archive -Path "dist/Fuji HDR Extractor/*" -DestinationPath $archive -Force
          "ARCHIVE_NAME=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-portable
          path: ${{ env.ARCHIVE_NAME }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ${{ env.ARCHIVE_NAME }}
